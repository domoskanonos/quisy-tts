name: Build Documentation
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          # Install MkDocs and theme + plantuml plugin
          python -m pip install --upgrade pip
          python -m pip install mkdocs mkdocs-material mkdocs-plantuml plantuml
      - name: Build Docs
        run: |
          mkdocs build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site/
