<div class="settings-page fade-in">
    <p-toast />

    <header class="page-header">
        <h1>
            <i class="pi pi-cog"></i>
            Einstellungen
        </h1>
        <p class="subtitle">Verwalte deine persönlichen Präferenzen</p>
    </header>

    <div class="settings-card glass-card">
        <div class="setting-item">
            <div class="setting-info">
                <h3>Standardsprache</h3>
                <p>Diese Sprache wird bei der Sprachauswahl priorisiert angezeigt.</p>
            </div>
            <div class="setting-control">
                <p-select [options]="languages()" [(ngModel)]="currentLang" (onChange)="onLangChange($event.value)"
                    placeholder="Sprache wählen" appendTo="body" [style]="{'width': '250px'}">
                </p-select>
            </div>
        </div>

        <!-- Future settings can be added here -->
    </div>
</div>
