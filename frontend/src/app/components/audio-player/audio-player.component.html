<div class="player-container glass-card" *ngIf="audioUrl()">
    <!-- Waveform Visualizer -->
    <div class="waveform-container" (click)="togglePlay()">
        <div class="waveform-bar" *ngFor="let val of waveformData(); let i = index" [style.height.%]="val * 100"
            [class.active]="(i / waveformData().length) * duration() <= currentTime()">
        </div>
    </div>

    <!-- Controls -->
    <div class="player-controls">
        <span class="time-display">{{ formatTime(currentTime()) }} / {{ formatTime(duration()) }}</span>

        <button class="player-btn" (click)="stop()" title="Stop">
            <i class="pi pi-stop"></i>
        </button>

        <button class="player-btn play-btn" (click)="togglePlay()">
            <i class="pi" [class.pi-play]="!isPlaying()" [class.pi-pause]="isPlaying()"></i>
        </button>

        <button class="player-btn" (click)="download()" title="Download">
            <i class="pi pi-download"></i>
        </button>
    </div>
</div>
