<div class="player-container glass-card" *ngIf="audioUrl()">
    <!-- Waveform Visualizer -->
    <div class="waveform-container" (click)="togglePlay()" role="button" tabindex="0" aria-label="Audio abspielen/pausieren">
        <div class="waveform-bar" *ngFor="let val of waveformData(); let i = index" [style.height.%]="val * 100"
            [class.active]="(i / waveformData().length) * duration() <= currentTime()" aria-hidden="true">
        </div>
    </div>

    <!-- Controls -->
    <div class="player-controls">
        <span class="time-display">{{ formatTime(currentTime()) }} / {{ formatTime(duration()) }}</span>

        <button class="player-btn" (click)="stop()" title="Stop" aria-label="Stopp">
            <i class="pi pi-stop" aria-hidden="true"></i>
        </button>

        <button class="player-btn play-btn" (click)="togglePlay()" aria-label="Abspielen / Pause" [attr.aria-pressed]="isPlaying()">
            <i class="pi" [class.pi-play]="!isPlaying()" [class.pi-pause]="isPlaying()" aria-hidden="true"></i>
        </button>

        <button class="player-btn" (click)="download()" title="Download" aria-label="Herunterladen">
            <i class="pi pi-download" aria-hidden="true"></i>
        </button>
    </div>
</div>
